<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>FeedLens</title>
</head>
<body>
  <div class="popup">
    <!-- Page 1: Session Selector -->
    <div id="page-sessions">
      <header class="header">
        <h1 class="title">FeedLens AI</h1>
      </header>
      <div id="session-list" class="session-list"></div>
      <button id="create-session-btn" class="create-session-btn">+ Create New Session</button>

      <div id="scan-usage" class="scan-usage hidden">
        <div class="scan-usage-row">
          <span id="scan-usage-text" class="scan-usage-text">0 / 2,000 tweets scanned today</span>
        </div>
        <div class="scan-usage-bar-track">
          <div id="scan-usage-fill" class="scan-usage-bar-fill"></div>
        </div>
        <p id="scan-limit-msg" class="scan-limit-msg hidden">Daily scan limit reached. Resets tomorrow.</p>
      </div>

      <section class="api-key-section">
        <label class="minimal-label" for="ai-api-key">OpenRouter API key</label>
        <input type="password" id="ai-api-key" class="text-input" placeholder="sk-or-..." />
      </section>
    </div>

    <!-- Page 2: Session Detail -->
    <div id="page-detail" class="hidden">
      <header class="header header-detail">
        <button id="back-btn" class="back-btn" aria-label="Back">&larr;</button>
        <h1 id="detail-title" class="title">New Session</h1>
      </header>

      <section class="session-name-section">
        <label class="minimal-label" for="session-name">Session name</label>
        <input type="text" id="session-name" class="text-input" placeholder="e.g. Claude updates" />
      </section>

      <section class="toggle-row">
        <label class="toggle-item">
          <span class="toggle-label">Extension</span>
          <span class="switch">
            <input type="checkbox" id="toggle-enabled" />
            <span class="switch-slider"></span>
          </span>
        </label>
        <label class="toggle-item">
          <span class="toggle-label">Sidebar</span>
          <span class="switch">
            <input type="checkbox" id="toggle-sidebar" />
            <span class="switch-slider"></span>
          </span>
        </label>
      </section>

      <label class="toggle-item toggle-item--full">
        <div class="toggle-item-label-group">
          <span class="toggle-label">Auto-scroll</span>
          <span class="toggle-sublabel">Scrolls your feed automatically to collect tweets</span>
        </div>
        <span class="switch">
          <input type="checkbox" id="toggle-autoscroll" />
          <span class="switch-slider"></span>
        </span>
      </label>

      <section class="search-collect">
        <label class="minimal-label" for="search-query">Search & Collect</label>
        <div class="search-collect-row">
          <input type="text" id="search-query" class="text-input" placeholder="e.g. React Server Components" />
          <button id="search-btn" class="add-btn">Search</button>
        </div>
        <p id="search-status" class="run-plugin-status" aria-live="polite"></p>
      </section>

      <section class="minimal-ai">
        <label class="minimal-label" for="ai-agenda">What to search</label>
        <textarea id="ai-agenda" class="ai-agenda" placeholder="e.g. React, TypeScript, and UI/UX engineering" rows="4"></textarea>

        <div class="detail-actions">
          <button id="save-run-btn" class="run-plugin-btn">Save & Run</button>
          <button id="delete-session-btn" class="delete-session-btn hidden">Delete Session</button>
        </div>
        <p id="run-plugin-status" class="run-plugin-status" aria-live="polite"></p>
      </section>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
