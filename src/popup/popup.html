<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>FeedLens</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1 class="title">FeedLens AI</h1>
    </header>

    <section class="minimal-ai">
      <label class="minimal-label" for="ai-agenda">What to search</label>
      <textarea id="ai-agenda" class="ai-agenda" placeholder="e.g. React, TypeScript, and UI/UX engineering" rows="4"></textarea>

      <label class="minimal-label" for="ai-api-key">OpenRouter API key</label>
      <input type="password" id="ai-api-key" class="text-input" placeholder="sk-or-..." />

      <button id="run-plugin-btn" class="run-plugin-btn">Run Plugin</button>
      <p id="run-plugin-status" class="run-plugin-status" aria-live="polite"></p>
    </section>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
