<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>FeedLens</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header-left">
        <h1 class="title">FeedLens</h1>
      </div>
      <div class="header-right">
        <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="10" y1="2" x2="10" y2="14" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <label class="power-toggle">
          <input type="checkbox" id="power-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <section class="ai-section">
      <div class="ai-header">
        <span class="ai-title">AI Scoring</span>
        <label class="ai-toggle">
          <input type="checkbox" id="ai-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <textarea id="ai-agenda" class="ai-agenda" placeholder="What are you looking for? e.g. 'Claude AI updates, UI design inspiration, React libraries'" rows="3"></textarea>
      <div class="ai-budget">
        <span id="ai-budget-text">0/50 requests used today</span>
        <div class="ai-budget-bar">
          <div id="ai-budget-fill" class="ai-budget-fill"></div>
        </div>
      </div>
      <div class="ai-api-key-row">
        <input type="password" id="ai-api-key" class="text-input" placeholder="sk-or-..." />
        <a href="https://openrouter.ai/keys" target="_blank" class="ai-get-key-btn">Get API Key</a>
      </div>
    </section>

    <button id="cta-btn" class="cta-btn">
      Run FeedLens
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 7H11.5M11.5 7L8 3.5M11.5 7L8 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <footer class="stats-bar">
      <span id="stats-scanned">0 scanned</span>
      <span class="stats-sep">&middot;</span>
      <span id="stats-relevant">0 relevant</span>
      <span class="stats-sep">&middot;</span>
      <span id="stats-filtered">0 filtered</span>
    </footer>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
